<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Regresión Lineal</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f7f9fc;
    padding: 40px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    color: #0b3c5d;
}

.linea {
    height: 3px;
    background: #0b3c5d;
    width: 60px;
    margin: 15px auto;
}

input {
    padding: 5px;
    margin: 4px;
    width: 70px;
}

button {
    background: #0b3c5d;
    color: white;
    border: none;
    padding: 8px 15px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #092c44;
}

.tabla {
    margin-top: 20px;
    border-collapse: collapse;
    width: 100%;
}

.tabla th, .tabla td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

.tabla th {
    background: #0b3c5d;
    color: white;
}

canvas {
    margin-top: 20px;
    border-top: 1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

<h1>Regresión Lineal</h1>
<div class="linea"></div>

<label>Número de puntos:</label>
<input type="number" id="n" min="2">
<button onclick="generar()">Generar</button>

<div id="datos"></div>

<button onclick="calcular()">Calcular</button>

<div id="info"></div>
<div id="tabla"></div>

<canvas id="graf1" width="800" height="300"></canvas>
<canvas id="graf2" width="800" height="300"></canvas>

</div>

<script>

function generar(){
    let n = document.getElementById("n").value;
    let cont = document.getElementById("datos");
    cont.innerHTML = "";

    for(let i=0;i<n;i++){
        cont.innerHTML += `
        <div>
            x${i+1}: <input id="x${i}">
            y${i+1}: <input id="y${i}">
        </div>`;
    }
}

function calcular(){

    let n = parseInt(document.getElementById("n").value);
    let x=[], y=[];

    for(let i=0;i<n;i++){
        x.push(parseFloat(document.getElementById("x"+i).value));
        y.push(parseFloat(document.getElementById("y"+i).value));
    }

    let M = x.map(v => [1, v]);

    let MT = [
        M.map(r=>r[0]),
        M.map(r=>r[1])
    ];

    let MTM = [
        [
            MT[0].reduce((s,v,i)=>s+v*M[i][0],0),
            MT[0].reduce((s,v,i)=>s+v*M[i][1],0)
        ],
        [
            MT[1].reduce((s,v,i)=>s+v*M[i][0],0),
            MT[1].reduce((s,v,i)=>s+v*M[i][1],0)
        ]
    ];

    let det = MTM[0][0]*MTM[1][1] - MTM[0][1]*MTM[1][0];

    if(det===0){
        alert("No se puede calcular");
        return;
    }

    let inv = [
        [ MTM[1][1]/det, -MTM[0][1]/det ],
        [ -MTM[1][0]/det, MTM[0][0]/det ]
    ];

    let MTB = [
        MT[0].reduce((s,v,i)=>s+v*y[i],0),
        MT[1].reduce((s,v,i)=>s+v*y[i],0)
    ];

    let b = inv[0][0]*MTB[0] + inv[0][1]*MTB[1];
    let m = inv[1][0]*MTB[0] + inv[1][1]*MTB[1];

    let y_adj = x.map(v => m*v + b);

    document.getElementById("info").innerHTML = `
        <h3>Resultados</h3>
        m = ${m.toFixed(5)}<br>
        b = ${b.toFixed(5)}<br>
        Ecuación: y = ${m.toFixed(4)}x + ${b.toFixed(4)}
    `;

    let tabla = "<table class='tabla'><tr><th>x</th><th>y</th><th>y ajustada</th></tr>";
    for(let i=0;i<n;i++){
        tabla += `<tr><td>${x[i]}</td><td>${y[i]}</td><td>${y_adj[i].toFixed(4)}</td></tr>`;
    }
    tabla += "</table>";
    document.getElementById("tabla").innerHTML = tabla;

    graficar("graf1", x, y, null);
    graficar("graf2", x, y, y_adj);
}

function graficar(id, x, y, y_adj){

    let canvas = document.getElementById(id);
    let ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let minX = Math.min(...x);
    let maxX = Math.max(...x);
    let minY = Math.min(...y, ...(y_adj||[]));
    let maxY = Math.max(...y, ...(y_adj||[]));

    let margenX = (maxX - minX) * 0.1 || 1;
    let margenY = (maxY - minY) * 0.1 || 1;

    minX -= margenX;
    maxX += margenX;
    minY -= margenY;
    maxY += margenY;

    function sx(v){ return 60 + (v-minX)/(maxX-minX)*700; }
    function sy(v){ return 260 - (v-minY)/(maxY-minY)*220; }

    ctx.strokeStyle = "#e0e0e0";
    ctx.lineWidth = 1;

    let pasos = 10;

    for(let i=0;i<=pasos;i++){
        let xp = 60 + i*(700/pasos);
        let yp = 40 + i*(220/pasos);

        ctx.beginPath();
        ctx.moveTo(xp, 40);
        ctx.lineTo(xp, 260);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(60, yp);
        ctx.lineTo(760, yp);
        ctx.stroke();
    }

    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1.5;

    if(minY <= 0 && maxY >= 0){
        let y0 = sy(0);
        ctx.beginPath();
        ctx.moveTo(60, y0);
        ctx.lineTo(760, y0);
        ctx.stroke();
    }

    if(minX <= 0 && maxX >= 0){
        let x0 = sx(0);
        ctx.beginPath();
        ctx.moveTo(x0, 40);
        ctx.lineTo(x0, 260);
        ctx.stroke();
    }

    ctx.fillStyle = "#333";
    ctx.font = "10px Arial";

    for(let i=0;i<=pasos;i++){
        let valX = minX + i*(maxX-minX)/pasos;
        let valY = minY + i*(maxY-minY)/pasos;

        let px = 60 + i*(700/pasos);
        let py = 260 - i*(220/pasos);

        ctx.fillText(valX.toFixed(2), px-10, 275);
        ctx.fillText(valY.toFixed(2), 20, py+3);
    }

    ctx.fillStyle = "#d9534f";
    for(let i=0;i<x.length;i++){
        ctx.beginPath();
        ctx.arc(sx(x[i]), sy(y[i]), 4, 0, 2*Math.PI);
        ctx.fill();
    }

    if(y_adj){
        ctx.strokeStyle = "#0b3c5d";
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(sx(x[0]), sy(y_adj[0]));

        for(let i=1;i<x.length;i++){
            ctx.lineTo(sx(x[i]), sy(y_adj[i]));
        }

        ctx.stroke();
    }
}

</script>

</body>
</html>
